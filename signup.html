<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join as Agent - AgentTrust</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter',sans-serif}
.primary-color{color:#0B4F37}
.primary-bg{background-color:#0B4F37}
.accent-bg{background-color:#F5B041}
.btn-primary{background:#0B4F37;color:#fff;transition:.3s}
.btn-primary:hover{box-shadow:0 10px 25px rgba(11,79,55,.3);transform:translateY(-2px)}
.form-input{border-color:#e5e7eb;transition:.3s}
.form-input:focus{border-color:#0B4F37;outline:none;box-shadow:0 0 0 3px rgba(11,79,55,.1)}
.form-input::placeholder{color:#9ca3af}
.error-message{color:#ef4444;font-size:.875rem;margin-top:.25rem;display:none}
.error-message.show{display:block}
.success-message{background:#0B4F37;color:#fff;padding:1rem;border-radius:.5rem;margin-bottom:1.5rem;display:none}
.success-message.show{display:block}
.upload-area{border:2px dashed #0B4F37;border-radius:.5rem;padding:1.5rem;text-align:center;cursor:pointer}
.file-input{display:none}
.password-toggle{cursor:pointer}
.checkbox-input{accent-color:#0B4F37}
.form-section{position:relative;padding-left:2.5rem}
.section-number{position:absolute;left:0;top:0;width:1.75rem;height:1.75rem;background:#0B4F37;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.875rem}
</style>
</head>

<body class="bg-white">

<main class="flex-1 py-12 px-4">
<div class="max-w-2xl mx-auto">

<h1 class="text-4xl font-bold mb-6 primary-color">Join as Agent</h1>

<div id="successMessage" class="success-message">
Account created successfully! We'll review your application.
</div>

<form id="signupForm" class="bg-gray-50 rounded-2xl p-8">

<!-- Personal -->
<div class="form-section mb-6">
<span class="section-number">1</span>
<h2 class="text-xl font-bold primary-color mb-4">Personal Information</h2>

<input id="fullName" class="form-input w-full px-4 py-2 border rounded-lg mb-4" placeholder="Full Name" required>
<input id="phoneNumber" class="form-input w-full px-4 py-2 border rounded-lg" placeholder="Phone Number" required>

</div>

<!-- Contact -->
<div class="form-section mb-6">
<span class="section-number">2</span>
<h2 class="text-xl font-bold primary-color mb-4">Contact</h2>

<input id="email" type="email" class="form-input w-full px-4 py-2 border rounded-lg mb-4" placeholder="Email" required>

<select id="location" class="form-input w-full px-4 py-2 border rounded-lg">
<option value="">Select location</option>
<option>Lagos</option>
<option>Port Harcourt</option>
<option>Abuja</option>
<option>Ibadan</option>
<option>Kano</option>
</select>

</div>

<!-- Verification -->
<div class="form-section mb-6">
<span class="section-number">3</span>
<h2 class="text-xl font-bold primary-color mb-4">Verification</h2>

<input id="nin" class="form-input w-full px-4 py-2 border rounded-lg mb-4" placeholder="NIN (11 digits)" required>
<input id="imblnLicense" class="form-input w-full px-4 py-2 border rounded-lg" placeholder="IMBLN License Number" required>

</div>

<!-- Upload -->
<div class="form-section mb-6">
<span class="section-number">4</span>
<h2 class="text-xl font-bold primary-color mb-4">License Upload</h2>

<div id="uploadArea" class="upload-area">
Click to upload license
<input type="file" id="licenseFile" class="file-input">
</div>

</div>

<!-- Password -->
<div class="form-section mb-6">
<span class="section-number">5</span>
<h2 class="text-xl font-bold primary-color mb-4">Security</h2>

<input id="password" type="password" class="form-input w-full px-4 py-2 border rounded-lg mb-4" placeholder="Password">

<input id="confirmPassword" type="password" class="form-input w-full px-4 py-2 border rounded-lg" placeholder="Confirm Password">

</div>

<!-- Terms -->
<div class="form-section mb-6">
<span class="section-number">6</span>

<label class="flex items-center gap-2">
<input id="agreeToTerms" type="checkbox" class="checkbox-input">
<span>I agree to Terms</span>
</label>

</div>

<button class="btn-primary w-full py-3 rounded-lg text-lg font-semibold">
Create Account
</button>

</form>
</div>
</main>

<!-- Supabase Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* =====================================
SUPABASE CONNECTION
===================================== */

const supabaseUrl = "https://welrbhtfsgxeeedycmym.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

/* =====================================
ELEMENTS
===================================== */

const form = document.getElementById("signupForm")
const fileInput = document.getElementById("licenseFile")
const uploadArea = document.getElementById("uploadArea")
const successMessage = document.getElementById("successMessage")

uploadArea.addEventListener("click",()=>fileInput.click())

/* =====================================
FORM SUBMIT
===================================== */

form.addEventListener("submit", async (e)=>{

e.preventDefault()

const fullName=document.getElementById("fullName").value
const phone=document.getElementById("phoneNumber").value
const email=document.getElementById("email").value
const location=document.getElementById("location").value
const nin=document.getElementById("nin").value
const license=document.getElementById("imblnLicense").value
const password=document.getElementById("password").value

try{

let fileUrl=null

/* Upload file if provided */

if(fileInput.files.length>0){

const file=fileInput.files[0]
const fileName=Date.now()+"_"+file.name

const {data:fileData,error:fileError}=await supabase
.storage
.from("licenses")
.upload(fileName,file)

if(fileError) throw fileError

fileUrl=fileData.path
}

/* Insert into database */

const {data,error}=await supabase
.from("agents")
.insert([
{
full_name:fullName,
phone:phone,
email:email,
location:location,
nin:nin,
imbln_license:license,
license_file:fileUrl,
verified:false,
verification_status:"pending"
}
])

if(error) throw error

successMessage.classList.add("show")
form.reset()

}catch(err){

alert("Error: "+err.message)

}

})

</script>

</body>
</html>
