<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join as Agent - AgentTrust</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: 'Inter', sans-serif; }
.primary-color{color:#0B4F37;}
.btn-primary{background:#0B4F37;color:white;transition:all .3s ease;}
.btn-primary:hover{box-shadow:0 10px 25px rgba(11,79,55,.3);transform:translateY(-2px);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.form-input{border:1px solid #e5e7eb;transition:all .3s ease;padding:.5rem;border-radius:.5rem;width:100%;}
.form-input:focus{border-color:#0B4F37;outline:none;box-shadow:0 0 0 3px rgba(11,79,55,.1);}
.error-message{color:#ef4444;font-size:.875rem;margin-top:.25rem;display:none;}
.error-message.show{display:block;}
.success-message{background:#0B4F37;color:white;padding:1rem;border-radius:.5rem;margin-bottom:1.5rem;display:none;}
.success-message.show{display:block;}
.alert-error{background:#ef4444;color:white;padding:1rem;border-radius:.5rem;margin-bottom:1.5rem;display:none;}
.alert-error.show{display:block;}
.checkbox-input{accent-color:#0B4F37;}
</style>
</head>
<body class="bg-white">

<div class="max-w-2xl mx-auto py-12 px-4">

<h1 class="text-4xl font-bold mb-2 primary-color">Join as Agent</h1>

<div id="successMessage" class="success-message"></div>
<div id="errorMessage" class="alert-error"><span id="errorText"></span></div>

<form id="signupForm" class="bg-gray-50 rounded-2xl p-8">

<div class="mb-6">
<label class="font-semibold">Full Name *</label>
<input id="fullName" class="form-input">
<div id="fullNameError" class="error-message"></div>
</div>

<div class="mb-6">
<label class="font-semibold">Phone Number *</label>
<input id="phoneNumber" class="form-input" placeholder="08012345678">
<div id="phoneNumberError" class="error-message"></div>
</div>

<div class="mb-6">
<label class="font-semibold">Email *</label>
<input id="email" type="email" class="form-input">
<div id="emailError" class="error-message"></div>
</div>

<div class="mb-6">
<label class="font-semibold">Location *</label>
<select id="location" class="form-input">
<option value="">Select location</option>
<option>Lagos</option>
<option>Port Harcourt</option>
<option>Abuja</option>
</select>
<div id="locationError" class="error-message"></div>
</div>

<div class="mb-6">
<label class="font-semibold">NIN (11 digits) *</label>
<input id="nin" maxlength="11" class="form-input">
<div id="ninError" class="error-message"></div>
</div>

<div class="mb-6">
<label class="font-semibold">IMBLN License *</label>
<input id="imblnLicense" class="form-input">
<div id="imblnLicenseError" class="error-message"></div>
</div>

<div class="mb-6">
<label class="font-semibold">Password *</label>
<input type="password" id="password" class="form-input">
<div id="passwordError" class="error-message"></div>
</div>

<div class="mb-6">
<label class="font-semibold">Confirm Password *</label>
<input type="password" id="confirmPassword" class="form-input">
<div id="confirmPasswordError" class="error-message"></div>
</div>

<div class="mb-6">
<label class="flex items-center space-x-2">
<input type="checkbox" id="agreeToTerms" class="checkbox-input">
<span>I agree to Terms</span>
</label>
<div id="agreeToTermsError" class="error-message"></div>
</div>

<button type="button" id="submitBtn" class="btn-primary w-full py-3 rounded-lg font-semibold">
Create Account
</button>

</form>
</div>

<script>
// Supabase config
const supabaseUrl = "https://welrbhtfsgxeeedycmym.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbHJiaHRmc2d4ZWVlZHljbXltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzY0MzksImV4cCI6MjA4ODg1MjQzOX0.bnOBFPPl51RVffRBPeDPNoEZAvVA4WfXZ8ugyRdhGkE";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

// Elements
const form = document.getElementById("signupForm");
const submitBtn = document.getElementById("submitBtn");
const successMessage = document.getElementById("successMessage");
const errorMessage = document.getElementById("errorMessage");
const errorText = document.getElementById("errorText");

// Validation
function validateForm() {
  let errors = {};
  const phone = document.getElementById("phoneNumber").value.trim();
  const nin = document.getElementById("nin").value.trim();
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirmPassword").value;

  if(!/^0\d{10}$/.test(phone)) errors.phoneNumber="Phone must start with 0 and be 11 digits";
  if(!/^\d{11}$/.test(nin)) errors.nin="NIN must be exactly 11 digits";
  if(password.length<8) errors.password="Password must be at least 8 characters";
  if(password!==confirm) errors.confirmPassword="Passwords do not match";
  if(!document.getElementById("agreeToTerms").checked) errors.agreeToTerms="You must accept terms";

  return errors;
}

function displayErrors(errors) {
  document.querySelectorAll(".error-message").forEach(e => e.classList.remove("show"));
  for(let field in errors) {
    const el = document.getElementById(field + "Error");
    if(el){ el.textContent = errors[field]; el.classList.add("show"); }
  }
}

// Submit
submitBtn.addEventListener("click", async function() {
  successMessage.classList.remove("show");
  errorMessage.classList.remove("show");

  const errors = validateForm();
  if(Object.keys(errors).length>0){ displayErrors(errors); return; }

  submitBtn.disabled = true;
  submitBtn.textContent = "Creating Account...";

  const fullName = document.getElementById("fullName").value;
  const phone = document.getElementById("phoneNumber").value;
  const email = document.getElementById("email").value;
  const location = document.getElementById("location").value;
  const nin = document.getElementById("nin").value;
  const license = document.getElementById("imblnLicense").value;

  try{
    console.log("Submitting data to Supabase:", {fullName, phone, email, location, nin, license});

    // Check duplicates
    const { data: existing, error: dupError } = await supabase
      .from("agents")
      .select("id")
      .or(`NIN.eq.${nin},phone.eq.${phone}`)
      .limit(1);

    if(dupError) throw dupError;
    if(existing.length > 0) throw new Error("An account with this NIN or phone already exists.");

    // Insert
    const { data, error } = await supabase
      .from("agents")
      .insert([{
        "full name": fullName,
        phone: phone,
        email: email,
        location: location,
        "NIN": nin,
        "IMBLN license": license,
        verified: false,
        "verification status": "pending",
        "created at": new Date()
      }]);

    if(error) throw error;

    console.log("Insert success:", data);
    successMessage.textContent = "✓ Account created successfully! We'll review your application.";
    successMessage.classList.add("show");
    form.reset();

  } catch(err) {
    console.error("Error:", err);
    errorText.textContent = err.message || "Something went wrong";
    errorMessage.classList.add("show");
  }

  submitBtn.disabled = false;
  submitBtn.textContent = "Create Account";
});
</script>

</body>
</html>
