<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join as Agent - AgentTrust</title>
<meta name="description" content="Create your agent account on AgentTrust and get verified with us.">
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

body {font-family:'Inter',sans-serif;}

.primary-color{color:#0B4F37;}
.primary-bg{background:#0B4F37;}
.accent-bg{background:#F5B041;}

.btn-primary{
background:#0B4F37;
color:white;
transition:all .3s ease;
}

.btn-primary:hover{
box-shadow:0 10px 25px rgba(11,79,55,.3);
transform:translateY(-2px);
}

.btn-primary:disabled{
opacity:.6;
cursor:not-allowed;
transform:none;
}

.form-input{
border-color:#e5e7eb;
transition:all .3s ease;
}

.form-input:focus{
border-color:#0B4F37;
outline:none;
box-shadow:0 0 0 3px rgba(11,79,55,.1);
}

.error-message{
color:#ef4444;
font-size:.875rem;
margin-top:.25rem;
display:none;
}

.error-message.show{display:block;}

.success-message{
background:#0B4F37;
color:white;
padding:1rem;
border-radius:.5rem;
margin-bottom:1.5rem;
display:none;
}

.success-message.show{display:block;}

.alert-error{
background:#ef4444;
color:white;
padding:1rem;
border-radius:.5rem;
margin-bottom:1.5rem;
display:none;
}

.alert-error.show{display:block;}

.upload-area{
border:2px dashed #0B4F37;
border-radius:.5rem;
padding:1.5rem;
text-align:center;
cursor:pointer;
}

.file-input{display:none;}

.checkbox-input{accent-color:#0B4F37;}

.form-section{
position:relative;
padding-left:2.5rem;
}

.section-number{
position:absolute;
left:0;
top:0;
width:1.75rem;
height:1.75rem;
background:#0B4F37;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:.875rem;
}
</style>
</head>

<body class="bg-white">

<header class="border-b border-gray-100">
<div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

<div class="flex items-center space-x-2">
<svg class="w-8 h-8 primary-color" fill="currentColor" viewBox="0 0 24 24">
<path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
</svg>
<span class="text-2xl font-bold primary-color">AgentTrust</span>
</div>

</div>
</header>

<main class="py-12 px-4">
<div class="max-w-2xl mx-auto">

<h1 class="text-4xl font-bold mb-2 primary-color">Join as Agent</h1>
<p class="text-gray-600 mb-8">Complete all sections to create your account</p>

<div id="successMessage" class="success-message">
✓ Account created successfully! We'll review your application.
</div>

<div id="errorMessage" class="alert-error">
<span id="errorText">Something went wrong.</span>
</div>

<form id="signupForm" class="bg-gray-50 rounded-2xl p-8">

<!-- FULL NAME -->
<div class="mb-6">
<label class="font-semibold">Full Name *</label>
<input id="fullName" name="fullName" class="form-input w-full border px-4 py-2 rounded-lg" required>
<div id="fullNameError" class="error-message"></div>
</div>

<!-- PHONE -->
<div class="mb-6">
<label class="font-semibold">Phone Number *</label>
<input id="phoneNumber" name="phoneNumber" class="form-input w-full border px-4 py-2 rounded-lg" placeholder="08012345678">
<div id="phoneNumberError" class="error-message"></div>
</div>

<!-- EMAIL -->
<div class="mb-6">
<label class="font-semibold">Email *</label>
<input id="email" name="email" type="email" class="form-input w-full border px-4 py-2 rounded-lg">
<div id="emailError" class="error-message"></div>
</div>

<!-- LOCATION -->
<div class="mb-6">
<label class="font-semibold">Location *</label>
<select id="location" name="location" class="form-input w-full border px-4 py-2 rounded-lg">
<option value="">Select location</option>
<option>Lagos</option>
<option>Port Harcourt</option>
<option>Abuja</option>
</select>
<div id="locationError" class="error-message"></div>
</div>

<!-- NIN -->
<div class="mb-6">
<label class="font-semibold">NIN (11 digits) *</label>
<input id="nin" name="nin" maxlength="11" class="form-input w-full border px-4 py-2 rounded-lg">
<div id="ninError" class="error-message"></div>
</div>

<!-- LICENSE -->
<div class="mb-6">
<label class="font-semibold">IMBLN License *</label>
<input id="imblnLicense" name="imblnLicense" class="form-input w-full border px-4 py-2 rounded-lg">
<div id="imblnLicenseError" class="error-message"></div>
</div>

<!-- PASSWORD -->
<div class="mb-6">
<label class="font-semibold">Password *</label>
<input type="password" id="password" name="password" class="form-input w-full border px-4 py-2 rounded-lg">
<div id="passwordError" class="error-message"></div>
</div>

<!-- CONFIRM PASSWORD -->
<div class="mb-6">
<label class="font-semibold">Confirm Password *</label>
<input type="password" id="confirmPassword" class="form-input w-full border px-4 py-2 rounded-lg">
<div id="confirmPasswordError" class="error-message"></div>
</div>

<!-- TERMS -->
<div class="mb-6">
<label class="flex items-center space-x-2">
<input type="checkbox" id="agreeToTerms" class="checkbox-input">
<span>I agree to Terms</span>
</label>
<div id="agreeToTermsError" class="error-message"></div>
</div>

<button id="submitBtn" class="btn-primary w-full py-3 rounded-lg font-semibold">
Create Account
</button>

</form>

</div>
</main>

<script>

const form=document.getElementById("signupForm");
const successMessage=document.getElementById("successMessage");
const errorMessage=document.getElementById("errorMessage");
const errorText=document.getElementById("errorText");
const submitBtn=document.getElementById("submitBtn");

function validateForm(){

let errors={};

let phone=document.getElementById("phoneNumber").value.trim();
let nin=document.getElementById("nin").value.trim();
let password=document.getElementById("password").value;
let confirm=document.getElementById("confirmPassword").value;

if(!/^0\d{10}$/.test(phone))
errors.phoneNumber="Phone must start with 0 and be 11 digits";

if(!/^\d{11}$/.test(nin))
errors.nin="NIN must be exactly 11 digits";

if(password.length<8)
errors.password="Password must be at least 8 characters";

if(password!==confirm)
errors.confirmPassword="Passwords do not match";

if(!document.getElementById("agreeToTerms").checked)
errors.agreeToTerms="You must accept terms";

return errors;
}

function displayErrors(errors){

document.querySelectorAll(".error-message").forEach(e=>e.classList.remove("show"));

for(let field in errors){
let el=document.getElementById(field+"Error");
if(el){
el.textContent=errors[field];
el.classList.add("show");
}
}
}

form.addEventListener("submit",async function(e){

e.preventDefault();

successMessage.classList.remove("show");
errorMessage.classList.remove("show");

const errors=validateForm();

if(Object.keys(errors).length>0){
displayErrors(errors);
return;
}

submitBtn.disabled=true;
submitBtn.textContent="Creating Account...";

try{

const formData=new FormData(form);

const response=await fetch("https://formspree.io/f/xkoqblbq",{
method:"POST",
body:formData,
headers:{'Accept':'application/json'}
});

if(response.ok){

successMessage.classList.add("show");
form.reset();

}else{

throw new Error("Submission failed");

}

}catch(err){

errorText.textContent="Something went wrong. Please try again.";
errorMessage.classList.add("show");

}

submitBtn.disabled=false;
submitBtn.textContent="Create Account";

});

</script>

</body>
</html>
