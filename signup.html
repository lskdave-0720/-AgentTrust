<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join as Agent - AgentTrust</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .primary-color{color:#0B4F37;}
        .btn-primary{background:#0B4F37;color:white;transition:all .3s ease;}
        .btn-primary:hover{box-shadow:0 10px 25px rgba(11,79,55,.3);transform:translateY(-2px);}
        .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;}
        .form-input{border:1px solid #e5e7eb;transition:all .3s ease;padding:.5rem;border-radius:.5rem;width:100%;}
        .form-input:focus{border-color:#0B4F37;outline:none;box-shadow:0 0 0 3px rgba(11,79,55,.1);}
        .error-message{color:#ef4444;font-size:.875rem;margin-top:.25rem;display:none;}
        .error-message.show{display:block;}
        .success-message{background:#0B4F37;color:white;padding:1rem;border-radius:.5rem;margin-bottom:1.5rem;display:none;}
        .success-message.show{display:block;}
        .alert-error{background:#ef4444;color:white;padding:1rem;border-radius:.5rem;margin-bottom:1.5rem;display:none;}
        .alert-error.show{display:block;}
        .checkbox-input{accent-color:#0B4F37;}
    </style>
</head>
<body class="bg-white">

<div class="max-w-2xl mx-auto py-12 px-4">

    <h1 class="text-4xl font-bold mb-2 primary-color">Join as Agent</h1>

    <div id="successMessage" class="success-message"></div>
    <div id="errorMessage" class="alert-error"><span id="errorText"></span></div>

    <form id="signupForm" class="bg-gray-50 rounded-2xl p-8">

        <div class="mb-6">
            <label class="font-semibold">Full Name *</label>
            <input id="fullName" class="form-input" required>
            <div id="fullNameError" class="error-message"></div>
        </div>

        <div class="mb-6">
            <label class="font-semibold">Phone Number *</label>
            <input id="phoneNumber" class="form-input" placeholder="08012345678" required>
            <div id="phoneNumberError" class="error-message"></div>
        </div>

        <div class="mb-6">
            <label class="font-semibold">Email *</label>
            <input id="email" type="email" class="form-input" required>
            <div id="emailError" class="error-message"></div>
        </div>

        <div class="mb-6">
            <label class="font-semibold">Location *</label>
            <select id="location" class="form-input" required>
                <option value="">Select location</option>
                <option>Lagos</option>
                <option>Port Harcourt</option>
                <option>Abuja</option>
                <option>Ibadan</option>
                <option>Kano</option>
                <option>Other</option>
            </select>
            <div id="locationError" class="error-message"></div>
        </div>

        <div class="mb-6">
            <label class="font-semibold">NIN (11 digits) *</label>
            <input id="nin" maxlength="11" class="form-input" required>
            <div id="ninError" class="error-message"></div>
        </div>

        <div class="mb-6">
            <label class="font-semibold">IMBLN License (Optional)</label>
            <input id="imblnLicense" class="form-input" placeholder="Enter if you have one">
            <div id="imblnLicenseError" class="error-message"></div>
        </div>

        <div class="mb-6">
            <label class="font-semibold">Password *</label>
            <input type="password" id="password" class="form-input" required>
            <div id="passwordError" class="error-message"></div>
        </div>

        <div class="mb-6">
            <label class="font-semibold">Confirm Password *</label>
            <input type="password" id="confirmPassword" class="form-input" required>
            <div id="confirmPasswordError" class="error-message"></div>
        </div>

        <div class="mb-6">
            <label class="flex items-center space-x-2">
                <input type="checkbox" id="agreeToTerms" class="checkbox-input" required>
                <span>I agree to the Terms and Privacy Policy</span>
            </label>
            <div id="agreeToTermsError" class="error-message"></div>
        </div>

        <button type="button" id="submitBtn" class="btn-primary w-full py-3 rounded-lg font-semibold">
            Create Account
        </button>
    </form>
</div>

<script>
    const SHEET_BEST_URL = 'https://api.sheetbest.com/sheets/09a9b814-1ab5-484e-963a-b398b0a98f81';

    const form = document.getElementById("signupForm");
    const submitBtn = document.getElementById("submitBtn");
    const successMessage = document.getElementById("successMessage");
    const errorMessage = document.getElementById("errorMessage");
    const errorText = document.getElementById("errorText");

    function validateForm() {
        let errors = {};
        const fullName = document.getElementById("fullName").value.trim();
        const phone = document.getElementById("phoneNumber").value.trim();
        const email = document.getElementById("email").value.trim();
        const location = document.getElementById("location").value;
        const nin = document.getElementById("nin").value.trim();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword").value;

        if (!fullName) errors.fullName = "Full name is required";
        if (!email) errors.email = "Email is required";
        if (!location) errors.location = "Location is required";
        if (!/^0\d{10}$/.test(phone)) errors.phoneNumber = "Phone must start with 0 and be 11 digits";
        if (!/^\d{11}$/.test(nin)) errors.nin = "NIN must be exactly 11 digits";
        if (password.length < 8) errors.password = "Password must be at least 8 characters";
        if (password !== confirm) errors.confirmPassword = "Passwords do not match";
        if (!document.getElementById("agreeToTerms").checked) errors.agreeToTerms = "You must accept terms";

        return errors;
    }

    function displayErrors(errors) {
        document.querySelectorAll(".error-message").forEach(e => e.classList.remove("show"));
        for (let field in errors) {
            const el = document.getElementById(field + "Error");
            if (el) {
                el.textContent = errors[field];
                el.classList.add("show");
            }
        }
    }

    submitBtn.addEventListener("click", async function(e) {
        e.preventDefault();
        successMessage.classList.remove("show");
        errorMessage.classList.remove("show");

        const errors = validateForm();
        if (Object.keys(errors).length > 0) {
            displayErrors(errors);
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Creating Account...";

        const formData = {
            full_name: document.getElementById("fullName").value.trim(),
            phone: document.getElementById("phoneNumber").value.trim(),
            email: document.getElementById("email").value.trim(),
            location: document.getElementById("location").value,
            nin: document.getElementById("nin").value.trim(),
            imbln_license: document.getElementById("imblnLicense").value.trim() || "Not provided",
            verified: "false",
            verification_status: "pending",
            timestamp: new Date().toLocaleString()
        };

        try {
            const response = await fetch(SHEET_BEST_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify([formData])
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP error ${response.status}: ${errorText}`);
            }

            const result = await response.json();
            console.log('Sheet.best response:', result);

            successMessage.textContent = "✓ Account created successfully! We'll review your application.";
            successMessage.classList.add("show");
            form.reset();

            setTimeout(() => {
                successMessage.classList.remove("show");
            }, 5000);

        } catch (err) {
            console.error('Error:', err);
            errorText.textContent = err.message || "Something went wrong. Please try again.";
            errorMessage.classList.add("show");
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Create Account";
        }
    });
</script>

</body>
</html>
