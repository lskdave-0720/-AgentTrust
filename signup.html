<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://welrbhtfsgxeeedycmym.supabase.co";
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI...";
const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

const form = document.getElementById("signupForm");
const successMessage = document.getElementById("successMessage");
const errorMessage = document.getElementById("errorMessage");
const errorText = document.getElementById("errorText");
const submitBtn = document.getElementById("submitBtn");

const fileInput = document.getElementById("licenseFile");
const uploadArea = document.getElementById("uploadArea");

uploadArea.addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", () => {
  if (fileInput.files.length > 0) {
    document.getElementById("fileName").textContent = fileInput.files[0].name;
  }
});

function togglePassword(id) {
  const field = document.getElementById(id);
  field.type = field.type === "password" ? "text" : "password";
}

function showError(id, message) {
  const el = document.getElementById(id + "Error");
  if (el) {
    el.textContent = message;
    el.classList.add("show");
  }
}

function clearErrors() {
  document.querySelectorAll(".error-message").forEach(e => {
    e.classList.remove("show");
  });
}

function validateForm() {

  clearErrors();
  let valid = true;

  const fullName = document.getElementById("fullName").value.trim();
  const phone = document.getElementById("phoneNumber").value.trim();
  const email = document.getElementById("email").value.trim();
  const location = document.getElementById("location").value;
  const nin = document.getElementById("nin").value.trim();
  const license = document.getElementById("imblnLicense").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const agree = document.getElementById("agreeToTerms").checked;

  if (!fullName) {
    showError("fullName", "Full name is required");
    valid = false;
  }

  if (!/^0\d{10}$/.test(phone)) {
    showError("phoneNumber", "Phone must start with 0 and be 11 digits");
    valid = false;
  }

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showError("email", "Invalid email address");
    valid = false;
  }

  if (!location) {
    showError("location", "Select a location");
    valid = false;
  }

  if (!/^\d{11}$/.test(nin)) {
    showError("nin", "NIN must be exactly 11 digits");
    valid = false;
  }

  if (!license) {
    showError("imblnLicense", "License number required");
    valid = false;
  }

  if (password.length < 8) {
    showError("password", "Password must be at least 8 characters");
    valid = false;
  }

  if (password !== confirmPassword) {
    showError("confirmPassword", "Passwords do not match");
    valid = false;
  }

  if (!agree) {
    showError("agreeToTerms", "You must accept terms");
    valid = false;
  }

  return valid;
}

form.addEventListener("submit", async function(e) {

  e.preventDefault();   // PREVENT PAGE REFRESH

  errorMessage.classList.remove("show");
  successMessage.classList.remove("show");

  if (!validateForm()) return;

  submitBtn.disabled = true;
  submitBtn.textContent = "Creating Account...";

  const file = fileInput.files[0];
  let fileUrl = null;

  try {

    /* Upload document if exists */

    if (file) {

      const filePath = "licenses/" + Date.now() + "_" + file.name;

      const { error: uploadError } = await supabase.storage
        .from("agent-documents")
        .upload(filePath, file);

      if (uploadError) throw uploadError;

      const { data } = supabase.storage
        .from("agent-documents")
        .getPublicUrl(filePath);

      fileUrl = data.publicUrl;
    }

    /* Create user in Supabase Auth */

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { data: authData, error: authError } = await supabase.auth.signUp({
      email,
      password
    });

    if (authError) throw authError;

    /* Save agent data */

    const { error } = await supabase
      .from("agents")
      .insert({
        user_id: authData.user.id,
        full_name: document.getElementById("fullName").value.trim(),
        phone: document.getElementById("phoneNumber").value.trim(),
        email: email,
        location: document.getElementById("location").value,
        nin: document.getElementById("nin").value,
        imbln_license: document.getElementById("imblnLicense").value.trim(),
        license_document: fileUrl,
        verified: false,
        verification_status: "pending"
      });

    if (error) throw error;

    /* SUCCESS */

    successMessage.classList.add("show");

    form.reset();

    document.getElementById("fileName").textContent =
      "PDF, DOC, JPG up to 5MB";

  } catch (err) {

    errorText.textContent = err.message;
    errorMessage.classList.add("show");

  } finally {

    submitBtn.disabled = false;
    submitBtn.textContent = "Create Account";

  }

});
</script>
